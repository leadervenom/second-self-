name: Build & Release PKG

on:
  push:
    tags:
      - 'v*'  # Trigger on version tags like v0.1.0
  workflow_dispatch:
    inputs:
      skip_notarize:
        description: 'Skip notarization (faster, for testing)'
        type: boolean
        default: false

env:
  PYTHON_VERSION: "3.11.11"
  PYTHON_RELEASE: "20250317"

jobs:
  build-pkg:
    runs-on: macos-14  # Apple Silicon runner
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch standalone Python
        run: bash scripts/fetch-python.sh

      - name: Vendor Python dependencies
        run: bash scripts/vendor-deps.sh

      - name: Build Swift binary (release)
        run: |
          cd SecondSelf
          swift build -c release

      - name: Import signing certificates
        env:
          APP_CERT_BASE64: ${{ secrets.DEVELOPER_ID_APP_CERT }}
          INSTALLER_CERT_BASE64: ${{ secrets.DEVELOPER_ID_INSTALLER_CERT }}
          CERT_PASSWORD: ${{ secrets.CERT_PASSWORD }}
        run: |
          # Create temporary keychain
          KEYCHAIN_PATH=$RUNNER_TEMP/signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH"

          # Import Developer ID Application certificate
          echo "$APP_CERT_BASE64" | base64 --decode > $RUNNER_TEMP/app_cert.p12
          security import $RUNNER_TEMP/app_cert.p12 -k "$KEYCHAIN_PATH" \
            -P "$CERT_PASSWORD" -T /usr/bin/codesign -T /usr/bin/productsign
          rm $RUNNER_TEMP/app_cert.p12

          # Import Developer ID Installer certificate
          echo "$INSTALLER_CERT_BASE64" | base64 --decode > $RUNNER_TEMP/installer_cert.p12
          security import $RUNNER_TEMP/installer_cert.p12 -k "$KEYCHAIN_PATH" \
            -P "$CERT_PASSWORD" -T /usr/bin/codesign -T /usr/bin/productsign
          rm $RUNNER_TEMP/installer_cert.p12

          # Allow codesign and productsign to use the keychain
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

      - name: Store notarization credentials
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        run: |
          xcrun notarytool store-credentials "SecondSelf-Notary" \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_PASSWORD"

      - name: Bundle demo env
        env:
          DEMO_ENV: ${{ secrets.DEMO_ENV }}
        run: |
          if [ -n "$DEMO_ENV" ]; then
            echo "$DEMO_ENV" > .env
          fi

      - name: Build PKG
        run: bash build-pkg.sh

      - name: Notarize PKG
        if: inputs.skip_notarize != true
        run: bash scripts/sign-and-notarize.sh --wait

      - name: Get version
        id: version
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          VERSION=$(grep 'VERSION=' build-pkg.sh | head -1 | cut -d'"' -f2)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          TAG_NAME="${REF_NAME:-v$VERSION}"
          echo "tag=$TAG_NAME" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "Second Self ${{ steps.version.outputs.version }}"
          body: |
            ## Install

            1. Download `SecondSelf.pkg` below
            2. Double-click to install
            3. Launch **Second Self** from Applications
            4. Follow the setup wizard

            **Requirements**: macOS 13+ (Ventura or later), Apple Silicon Mac with notch
          files: |
            build/SecondSelf.pkg
            build/SecondSelf.pkg.sha256
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Cleanup keychain
        if: always()
        run: security delete-keychain $RUNNER_TEMP/signing.keychain-db 2>/dev/null || true
